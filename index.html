<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Calendar Display</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 40px;
  }

  h1 {
    font-size: 72px;
    margin-bottom: 20px;
  }

  .today-box {
    border: 4px solid #facc15;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 40px;
  }

  .today-header {
    font-size: 48px;
    color: #facc15;
    margin-bottom: 10px;
  }

  .week {
    margin-bottom: 40px;
    padding: 10px;
  }

  .current-week {
    border: 4px solid #facc15;
    border-radius: 10px;
    padding: 20px;
  }

  .week-title {
    font-size: 48px;
    color: #38bdf8;
    margin-bottom: 10px;
  }

  .event {
    font-size: 34px;
    margin-left: 20px;
    margin-bottom: 8px;
  }

  .no-events {
    font-size: 28px;
    margin-left: 20px;
    opacity: 0.6;
  }
</style>

</head>

<body>

<h1>Work Their Plant Schedule</h1>

<div id="today"></div>
<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/ical.js@1.4.0/build/ical.min.js"></script>

<script>

const rawICS = "https://outlook.office365.com/owa/calendar/9663133db0ff4bf5803e60b3e4bc8d13@campbellpress.com/61a2a6da4c664ab38e36068caeab96a614217089589047765428/calendar.ics";

const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// 🔥 FIX: force UTC so days don’t shift
function normalize(date) {
  return new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
}

function getWeekStart(date) {
  const d = new Date(date);
  d.setUTCDate(d.getUTCDate() - d.getUTCDay());
  return d;
}

function getDaysInWeek(eventStart, eventEnd, weekStart) {
  const days = [];
  const weekEnd = new Date(weekStart);
  weekEnd.setUTCDate(weekEnd.getUTCDate() + 6);

  let current = new Date(eventStart);

  while (current <= eventEnd) {
    if (current >= weekStart && current <= weekEnd) {
      days.push(current.getUTCDay());
    }
    current.setUTCDate(current.getUTCDate() + 1);
  }

  const unique = [...new Set(days)].sort((a,b)=>a-b);

  if (unique.length === 7) return "";
  if (unique.length === 1) return dayNames[unique[0]];

  return `${dayNames[unique[0]]}–${dayNames[unique[unique.length - 1]]}`;
}

// 🔥 FIX: fetch with fallback for phone compatibility
async function fetchICS() {
  try {
    const res = await fetch(rawICS);
    return await res.text();
  } catch {
    const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(rawICS);
    const res = await fetch(proxy);
    return await res.text();
  }
}

fetchICS().then(data => {

  const jcalData = ICAL.parse(data);
  const comp = new ICAL.Component(jcalData);
  const events = comp.getAllSubcomponents("vevent");

  const grouped = {};
  const todayEvents = [];

  const today = normalize(new Date());
  const currentWeekStart = getWeekStart(today);

  events.forEach(e => {

    const ev = new ICAL.Event(e);

    let start = normalize(ev.startDate.toJSDate());
    let end = normalize(ev.endDate ? ev.endDate.toJSDate() : start);

    if (ev.endDate && ev.endDate.hour === 0) {
      end.setUTCDate(end.getUTCDate() - 1);
    }

    let checkDate = new Date(start);
    while (checkDate <= end) {
      if (checkDate.getTime() === today.getTime()) {
        todayEvents.push(ev);
        break;
      }
      checkDate.setUTCDate(checkDate.getUTCDate() + 1);
    }

    let current = new Date(start);

    while (current <= end) {
      const weekStart = getWeekStart(current);
      const key = weekStart.toISOString();

      if (!grouped[key]) grouped[key] = [];

      grouped[key].push({
        title: ev.summary,
        date: start,
        end: end
      });

      current.setUTCDate(current.getUTCDate() + 7);
    }

  });

  // TODAY
  const todayContainer = document.getElementById("today");
  const todayBox = document.createElement("div");
  todayBox.className = "today-box";
  todayBox.innerHTML = `<div class="today-header">TODAY</div>`;

  if (todayEvents.length === 0) {
    todayBox.innerHTML += `<div class="no-events">No scheduled items</div>`;
  } else {
    todayEvents.forEach(ev => {
      todayBox.innerHTML += `<div class="event">${ev.summary.replace("Work Their Plant","").trim()}</div>`;
    });
  }

  todayContainer.appendChild(todayBox);

  // WEEKS
  const container = document.getElementById("calendar");

  for (let i = 0; i < 5; i++) {

    const weekDate = new Date(currentWeekStart);
    weekDate.setUTCDate(weekDate.getUTCDate() + (i * 7));

    const key = weekDate.toISOString();

    const weekDiv = document.createElement("div");
    weekDiv.className = "week";

    if (i === 0) weekDiv.classList.add("current-week");

    const endDate = new Date(weekDate);
    endDate.setUTCDate(endDate.getUTCDate() + 6);

    weekDiv.innerHTML += `<div class="week-title">
      Week of ${weekDate.toLocaleDateString()} - ${endDate.toLocaleDateString()}
    </div>`;

    const weekEvents = grouped[key] || [];

    if (weekEvents.length === 0) {
      weekDiv.innerHTML += `<div class="no-events">No scheduled items</div>`;
    } else {
      weekEvents.forEach(ev => {
        const label = getDaysInWeek(ev.date, ev.end, weekDate);
        const clean = ev.title.replace("Work Their Plant","").trim();
        weekDiv.innerHTML += `<div class="event">${clean}${label ? " — " + label : ""}</div>`;
      });
    }

    container.appendChild(weekDiv);
  }

});

</script>

<script>
  setTimeout(() => location.reload(), 300000);
</script>

</body>
</html>
