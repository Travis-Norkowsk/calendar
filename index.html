<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Calendar Display</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 40px;
  }

  h1 {
    font-size: 72px;
    margin-bottom: 20px;
  }

  .today-box {
    border: 4px solid #facc15;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 40px;
  }

  .today-header {
    font-size: 48px;
    color: #facc15;
    margin-bottom: 10px;
  }

  .week {
    margin-bottom: 40px;
    padding: 10px;
  }

  .current-week {
    border: 4px solid #facc15;
    border-radius: 10px;
    padding: 20px;
  }

  .week-title {
    font-size: 48px;
    color: #38bdf8;
    margin-bottom: 10px;
  }

  .event {
    font-size: 34px;
    margin-left: 20px;
    margin-bottom: 8px;
  }

  .no-events {
    font-size: 28px;
    margin-left: 20px;
    opacity: 0.6;
  }
</style>

</head>

<body>

<h1>Work Their Plant Schedule</h1>

<div id="today"></div>
<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/ical.js@1.4.0/build/ical.min.js"></script>

<script>

// 🔥 RELIABLE PROXY METHOD (with fallback)
const rawIcs = "https://outlook.office365.com/owa/calendar/9663133db0ff4bf5803e60b3e4bc8d13@campbellpress.com/08f4cb50093246e49c76c256f225f0371883905075519799792/calendar.ics";

const proxies = [
  "https://api.allorigins.win/raw?url=",
  "https://corsproxy.io/?"
];

function fetchICS() {
  return fetch(proxies[0] + rawIcs)
    .then(res => {
      if (!res.ok) throw new Error("Primary proxy failed");
      return res.text();
    })
    .catch(() => {
      return fetch(proxies[1] + rawIcs).then(res => res.text());
    });
}

const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function normalize(date) {
  return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

function getWeekStart(date) {
  const d = normalize(date);
  d.setDate(d.getDate() - d.getDay());
  return d;
}

function getDaysInWeek(eventStart, eventEnd, weekStart) {
  const days = [];
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);

  let current = new Date(eventStart);

  while (current <= eventEnd) {
    if (current >= weekStart && current <= weekEnd) {
      days.push(current.getDay());
    }
    current.setDate(current.getDate() + 1);
  }

  if (days.length === 0) return "";

  const unique = [...new Set(days)].sort((a,b)=>a-b);

  if (unique.length === 7) return "";
  if (unique.length === 1) return dayNames[unique[0]];

  return `${dayNames[unique[0]]}–${dayNames[unique[unique.length - 1]]}`;
}

fetchICS().then(data => {

  const jcalData = ICAL.parse(data);
  const comp = new ICAL.Component(jcalData);
  const events = comp.getAllSubcomponents("vevent");

  const grouped = {};
  const todayEvents = [];

  const today = normalize(new Date());
  const currentWeekStart = getWeekStart(today);

  events.forEach(e => {

    const ev = new ICAL.Event(e);

    let start = normalize(ev.startDate.toJSDate());
    let end = normalize(ev.endDate ? ev.endDate.toJSDate() : start);

    if (ev.endDate && ev.endDate.hour === 0) {
      end.setDate(end.getDate() - 1);
    }

    // TODAY logic
    let checkDate = new Date(start);
    while (checkDate <= end) {
      if (checkDate.toDateString() === today.toDateString()) {
        todayEvents.push(ev);
        break;
      }
      checkDate.setDate(checkDate.getDate() + 1);
    }

    let current = new Date(start);

    while (current <= end) {
      const weekStart = getWeekStart(current);
      const key = weekStart.toDateString();

      if (!grouped[key]) grouped[key] = [];

      grouped[key].push({
        title: ev.summary,
        date: start,
        end: end
      });

      current.setDate(current.getDate() + 7);
    }

  });

  // TODAY BOX
  const todayContainer = document.getElementById("today");
  const todayBox = document.createElement("div");
  todayBox.className = "today-box";

  const header = document.createElement("div");
  header.className = "today-header";
  header.innerText = "TODAY";
  todayBox.appendChild(header);

  if (todayEvents.length === 0) {
    const empty = document.createElement("div");
    empty.className = "no-events";
    empty.innerText = "No scheduled items";
    todayBox.appendChild(empty);
  } else {
    todayEvents.forEach(ev => {
      const div = document.createElement("div");
      div.className = "event";
      div.innerText = ev.summary.replace("Work Their Plant", "").trim();
      todayBox.appendChild(div);
    });
  }

  todayContainer.appendChild(todayBox);

  // WEEK VIEW
  const container = document.getElementById("calendar");

  for (let i = 0; i < 5; i++) {

    const weekDate = new Date(currentWeekStart);
    weekDate.setDate(weekDate.getDate() + (i * 7));

    const key = weekDate.toDateString();

    const weekDiv = document.createElement("div");
    weekDiv.className = "week";

    if (i === 0) weekDiv.classList.add("current-week");

    const title = document.createElement("div");
    title.className = "week-title";

    const endDate = new Date(weekDate);
    endDate.setDate(endDate.getDate() + 6);

    title.innerText = `Week of ${weekDate.toLocaleDateString()} - ${endDate.toLocaleDateString()}`;
    weekDiv.appendChild(title);

    const weekEvents = grouped[key] || [];

    if (weekEvents.length === 0) {
      const empty = document.createElement("div");
      empty.className = "no-events";
      empty.innerText = "No scheduled items";
      weekDiv.appendChild(empty);
    } else {
      weekEvents.forEach(ev => {
        const div = document.createElement("div");
        div.className = "event";

        const label = getDaysInWeek(ev.date, ev.end, weekDate);
        const clean = ev.title.replace("Work Their Plant", "").trim();

        div.innerText = label ? `${clean} — ${label}` : clean;

        weekDiv.appendChild(div);
      });
    }

    container.appendChild(weekDiv);
  }

});

</script>

<script>
  setTimeout(() => location.reload(), 300000);
</script>

</body>
</html>
