<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Calendar Display</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 40px;
  }

  h1 {
    font-size: 72px;
    margin-bottom: 20px;
  }

  .today-box {
    border: 4px solid #facc15;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 40px;
  }

  .today-header {
    font-size: 48px;
    color: #facc15;
    margin-bottom: 10px;
  }

  .week {
    margin-bottom: 40px;
    padding: 10px;
  }

  .current-week {
    border: 4px solid #facc15;
    border-radius: 10px;
    padding: 20px;
  }

  .week-title {
    font-size: 48px;
    color: #38bdf8;
    margin-bottom: 10px;
  }

  .event {
    font-size: 34px;
    margin-left: 20px;
    margin-bottom: 8px;
  }

  .no-events {
    font-size: 28px;
    margin-left: 20px;
    opacity: 0.6;
  }
</style>

</head>

<body>

<h1>Work Their Plant Schedule</h1>

<div id="today"></div>
<div id="calendar"></div>

<script>
const rawIcs = "https://outlook.office365.com/owa/calendar/9663133db0ff4bf5803e60b3e4bc8d13@campbellpress.com/08f4cb50093246e49c76c256f225f0371883905075519799792/calendar.ics";

// 🔥 direct iframe fallback (bulletproof)
document.body.innerHTML = `
<h1>Work Their Plant Schedule</h1>
<iframe src="${rawIcs.replace('.ics','.html')}" 
style="width:100%; height:90vh; border:none;"></iframe>
`;
</script>

</body>
</html>
